<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Hassel BA - Especialistas en Apple. Venta de iPhone nuevos y usados seleccionados en Berazategui.">
    <title>Hassel BA | Apple Premium Reseller</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <style>
        :root {
            --hassel-rojo: #d90724;
            --hassel-azul: #008acb;
            --negro-puro: #000000;
        }

        body { 
            font-family: 'DM Sans', sans-serif; 
            background-color: var(--negro-puro);
            background-image: url('FONDO & RELLENO - DEGRADE ROJO - A.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            color: white;
            -webkit-font-smoothing: antialiased;
        }

        .font-bebas { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05rem; }

        /* Glassmorphism Core */
        .glass {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-nav {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-hover:hover {
            border-color: var(--hassel-rojo);
            background: rgba(0, 0, 0, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(217, 7, 36, 0.15);
        }

        .active-filter {
            background-color: var(--hassel-rojo) !important;
            box-shadow: 0 0 20px rgba(217, 7, 36, 0.4);
            border-color: var(--hassel-rojo) !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-card { animation: fadeIn 0.5s ease forwards; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--hassel-rojo); border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 glass-nav">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="#" class="font-bebas text-3xl tracking-tighter hover:text-[#d90724] transition-colors">
                HASSEL <span class="text-[#d90724]">BA</span>
            </a>
            
            <div class="hidden md:flex gap-8 items-center font-bold text-[11px] tracking-[0.2em]">
                <a href="#hero" class="hover:text-[#d90724] transition-colors">INICIO</a>
                <a href="#productos-seccion" class="hover:text-[#d90724] transition-colors">STOCK</a>
                <a href="#service" class="hover:text-[#d90724] transition-colors">SERVICE</a>
                <a href="https://wa.me/5491136404202" target="_blank" class="bg-[#d90724] px-6 py-2 rounded-full hover:bg-white hover:text-black transition-all">CONTACTO</a>
            </div>
        </div>
    </nav>

    <section id="hero" class="relative h-[90vh] flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="FONDO & RELLENO - DEGRADE ROJO - B.jpg" class="w-full h-full object-cover opacity-60" alt="Background">
            <div class="absolute inset-0 bg-gradient-to-b from-black/20 via-transparent to-black"></div>
        </div>

        <div class="relative z-10 text-center px-6">
            <h1 class="font-bebas text-8xl md:text-[12rem] leading-none mb-4 animate-card tracking-tighter">
                HASSEL <span class="text-[#d90724]">BA</span>
            </h1>
            <p class="text-white/60 font-bold tracking-[0.4em] text-sm uppercase mb-12">Apple Premium Experience</p>
            <div class="flex flex-col md:flex-row gap-4 justify-center items-center">
                <a href="#productos-seccion" class="bg-white text-black px-10 py-4 rounded-full font-bold text-xs tracking-widest hover:bg-[#d90724] hover:text-white transition-all w-full md:w-auto uppercase">Ver Catálogo</a>
                <a href="#service" class="glass px-10 py-4 rounded-full font-bold text-xs tracking-widest hover:border-[#d90724] transition-all w-full md:w-auto uppercase">Servicio Técnico</a>
            </div>
        </div>
    </section>

    <section class="py-12 relative z-10">
        <div class="max-w-7xl mx-auto px-6 flex flex-wrap justify-center gap-4">
            <button onclick="filtrarStock('iphone-preowned', this)" class="filter-btn active-filter glass px-8 py-3 rounded-full font-bebas text-xl tracking-wider transition-all">IPHONE PREOWNED</button>
            <button onclick="filtrarStock('iphone-new', this)" class="filter-btn glass px-8 py-3 rounded-full font-bebas text-xl tracking-wider transition-all text-white/60">IPHONE NEW</button>
            <button onclick="filtrarStock('iphone-outlet', this)" class="filter-btn glass px-8 py-3 rounded-full font-bebas text-xl tracking-wider transition-all text-white/60">IPHONE OUTLET</button>
        </div>
    </section>

    <section id="productos-seccion" class="py-12 min-h-[600px]">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex justify-between items-end mb-12 border-b border-white/5 pb-8">
                <div>
                    <h2 id="titulo-categoria" class="font-bebas text-5xl uppercase">EQUIPOS EN STOCK</h2>
                    <p class="text-[#008acb] font-bold text-[10px] tracking-widest mt-2 uppercase">Garantía Hassel BA en cada unidad</p>
                </div>
                <div class="glass px-4 py-2 rounded-xl text-[10px] font-bold text-white/40 tracking-widest" id="contador-productos"></div>
            </div>

            <div id="stock-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>

            <div id="no-stock" class="hidden text-center py-40">
                <p class="font-bebas text-3xl text-white/20 uppercase tracking-widest">Consultar disponibilidad por WhatsApp</p>
            </div>
        </div>
    </section>

    <footer class="py-20 border-t border-white/5">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <h3 class="font-bebas text-4xl mb-4">HASSEL BA</h3>
            <p class="text-white/30 text-xs tracking-widest uppercase">Berazategui, Buenos Aires © 2026</p>
        </div>
    </footer>

    <script>
        const PARTE_A = 'https://docs.google.com/spreadsheets/d/e/';
        const PARTE_B = '2PACX-1vSbqP0rWIDTfM_0_B2Yt7-YF9F0Yk0hE8I4p8x0r0m0v0h0e8I4p8x0r0m0v0h/pub?output=csv'; // REEMPLAZAR CON TU LINK REAL
        const URL_FINAL = PARTE_A + PARTE_B;

        let valorDolarBlue = 1400; 
        let currentCategory = 'iphone-preowned';
        let STOCK_TOTAL = [];

        async function fetchDolar() {
            try {
                const res = await fetch('https://dolarapi.com/v1/dolares/blue');
                const data = await res.json();
                valorDolarBlue = data.venta;
            } catch (e) { console.error("Error dólar"); }
        }

        async function cargarStockGoogle() {
            try {
                const res = await fetch(URL_FINAL);
                const csv = await res.text();
                const filas = csv.split('\n').slice(1);
                
                STOCK_TOTAL = filas.map(linea => {
                    const c = linea.split(',');
                    return {
                        cat: c[0]?.trim(),
                        modelo: c[1]?.trim(),
                        gb: c[2]?.trim(),
                        color: c[3]?.trim(),
                        bat: c[4]?.trim(),
                        usd: parseFloat(c[5]),
                        grade: c[6]?.trim()
                    };
                }).filter(i => i.modelo);
                renderStock();
            } catch (e) { console.error("Error Sheets"); }
        }

        function createCardText(item) {
            const precioPesos = item.usd * valorDolarBlue;
            const waMsg = `Hola Hassel! Me interesa el iPhone ${item.modelo} de USD ${item.usd}. ¿Tienen stock?`;
            
            const gradoStyle = (item.grade === 'A+' || item.grade === 'Nuevo') 
                ? 'border-[#d90724] text-[#d90724] bg-[#d90724]/10' 
                : 'border-white/20 text-white/40 bg-white/5';

            return `
            <div class="glass glass-hover p-8 rounded-[2.5rem] flex flex-col justify-between transition-all duration-500 animate-card">
                <div>
                    <div class="flex justify-between items-start mb-6">
                        <span class="text-[9px] font-bold px-3 py-1 rounded-full border ${gradoStyle} uppercase tracking-[0.2em]">
                            GRADO ${item.grade}
                        </span>
                        <iconify-icon icon="apple-fill" class="text-white/10" width="22"></iconify-icon>
                    </div>
                    
                    <h3 class="font-bebas text-5xl text-white uppercase leading-none mb-2 tracking-tight">iPhone ${item.modelo}</h3>
                    <p class="text-white/40 text-[11px] font-bold uppercase tracking-[0.2em] mb-8">
                        ${item.gb} <span class="text-[#008acb] px-1">|</span> ${item.color}
                    </p>
                    
                    <div class="inline-flex items-center gap-3 px-4 py-2 rounded-2xl bg-white/5 border border-white/5 mb-10">
                        <iconify-icon icon="solar:battery-charge-bold" class="text-[#008acb]" width="18"></iconify-icon>
                        <span class="text-white/50 text-[10px] font-bold uppercase tracking-widest">Batería: <span class="text-white font-black">${item.bat}%</span></span>
                    </div>
                </div>

                <div class="flex justify-between items-end pt-6 border-t border-white/5">
                    <div>
                        <p class="text-4xl font-bebas text-[#d90724] leading-none mb-1">USD ${item.usd}</p>
                        <p class="text-[10px] text-white/20 font-bold tracking-widest uppercase">$${precioPesos.toLocaleString('es-AR')}</p>
                    </div>
                    <a href="https://wa.me/5491136404202?text=${encodeURIComponent(waMsg)}" target="_blank" 
                       class="bg-[#d90724] hover:bg-[#ff0000] text-white p-4 rounded-2xl transition-all shadow-lg shadow-red-900/20">
                        <iconify-icon icon="ic:baseline-whatsapp" width="28"></iconify-icon>
                    </a>
                </div>
            </div>`;
        }

        function renderStock() {
            const grid = document.getElementById('stock-grid');
            const data = STOCK_TOTAL.filter(i => i.cat === currentCategory);
            grid.innerHTML = data.map(i => createCardText(i)).join('');
            document.getElementById('contador-productos').innerText = `${data.length} UNIDADES`;
            document.getElementById('no-stock').classList.toggle('hidden', data.length > 0);
        }

        function filtrarStock(cat, btn) {
            currentCategory = cat;
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.remove('active-filter');
                b.classList.add('text-white/60');
            });
            btn.classList.add('active-filter');
            btn.classList.remove('text-white/60');
            renderStock();
        }

        window.onload = async () => {
            await fetchDolar();
            await cargarStockGoogle();
        };
    </script>
</body>
</html>
